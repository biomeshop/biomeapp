<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BiomeShop Panorama</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.1/index.css" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #05030b;
        color: #f6f2ff;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .header {
        padding: 14px 16px;
        background: rgba(12, 9, 19, 0.96);
        border-bottom: 1px solid rgba(255, 214, 102, 0.18);
      }

      .label {
        margin: 0 0 4px;
        font-size: 0.8rem;
        letter-spacing: 0.14em;
        color: #ffcf71;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 1.2rem;
      }

      #viewer {
        width: 100%;
        height: calc(100vh - 72px);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <p class="label">BiomeShop Panorama</p>
        <h1 id="title">Loading...</h1>
      </header>
      <div id="viewer"></div>
    </div>

    <script type="module">
      import { Viewer } from 'https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.1/+esm';

      const params = new URLSearchParams(window.location.search);
      const title = params.get('title') || 'BiomeShop 360';
      const imageUrl = params.get('imageUrl');
      const fullWidth = Number(params.get('fullWidth') || '0');
      const fullHeight = Number(params.get('fullHeight') || '0');
      const croppedWidth = Number(params.get('croppedWidth') || '0');
      const croppedHeight = Number(params.get('croppedHeight') || '0');
      const croppedX = Number(params.get('croppedX') || '0');
      const croppedY = Number(params.get('croppedY') || '0');

      document.getElementById('title').textContent = title;

      const panoData = fullWidth > 0 ? {
        fullWidth,
        fullHeight,
        croppedWidth,
        croppedHeight,
        croppedX,
        croppedY,
      } : undefined;

      new Viewer({
        container: document.getElementById('viewer'),
        panorama: imageUrl,
        panoData,
        defaultYaw: '0deg',
        defaultPitch: '0deg',
        defaultZoomLvl: 32,
        mousemove: true,
        mousewheel: true,
        moveInertia: true,
        moveSpeed: 0.55,
        zoomSpeed: 0.5,
        navbar: ['zoom', 'move', 'fullscreen'],
        touchmoveTwoFingers: false,
        keyboard: false,
      });
    </script>
  </body>
</html>
