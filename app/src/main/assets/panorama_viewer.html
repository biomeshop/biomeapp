<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BiomeShop Panorama</title>
    <link rel="stylesheet" href="vendor/pannellum.css" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #05030b;
        color: #f6f2ff;
      }

      #viewer {
        width: 100%;
        height: 100vh;
        background: #090612;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>

    <script src="vendor/pannellum.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const imageUrl = params.get('imageUrl');
      const fullWidth = Number(params.get('fullWidth') || '0');
      const fullHeight = Number(params.get('fullHeight') || '0');
      const croppedWidth = Number(params.get('croppedWidth') || '0');
      const croppedHeight = Number(params.get('croppedHeight') || '0');
      const croppedX = Number(params.get('croppedX') || '0');
      const croppedY = Number(params.get('croppedY') || '0');

      const config = {
        type: 'equirectangular',
        panorama: imageUrl,
        autoLoad: true,
        showControls: false,
        showFullscreenCtrl: false,
        mouseZoom: true,
        draggable: true,
        compass: false,
        hfov: 110,
        pitch: 0,
        yaw: 0,
        ignoreGPanoXMP: true,
      };

      if (fullWidth > 0 && fullHeight > 0 && croppedWidth > 0 && croppedHeight > 0) {
        config.haov = (croppedWidth / fullWidth) * 360;
        config.vaov = (croppedHeight / fullHeight) * 180;
        config.vOffset = 90 - (((croppedY + (croppedHeight / 2)) / fullHeight) * 180);
      }

      pannellum.viewer('viewer', config);
    </script>
  </body>
</html>
