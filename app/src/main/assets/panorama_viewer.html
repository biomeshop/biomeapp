<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BiomeShop Panorama</title>
    <link rel="stylesheet" href="vendor/pannellum.css" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #05030b;
        color: #f6f2ff;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .header {
        padding: 14px 16px;
        background: rgba(12, 9, 19, 0.96);
        border-bottom: 1px solid rgba(255, 214, 102, 0.18);
      }

      .label {
        margin: 0 0 4px;
        font-size: 0.8rem;
        letter-spacing: 0.14em;
        color: #ffcf71;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 1.2rem;
      }

      #viewer {
        width: 100%;
        height: calc(100vh - 72px);
        background: #090612;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <p class="label">BiomeShop Panorama</p>
        <h1 id="title">Loading...</h1>
      </header>
      <div id="viewer"></div>
    </div>

    <script src="vendor/pannellum.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const title = params.get('title') || 'BiomeShop 360';
      const imageUrl = params.get('imageUrl');
      const fullWidth = Number(params.get('fullWidth') || '0');
      const fullHeight = Number(params.get('fullHeight') || '0');
      const croppedWidth = Number(params.get('croppedWidth') || '0');
      const croppedHeight = Number(params.get('croppedHeight') || '0');
      const croppedX = Number(params.get('croppedX') || '0');
      const croppedY = Number(params.get('croppedY') || '0');

      document.getElementById('title').textContent = title;

      const config = {
        type: 'equirectangular',
        panorama: imageUrl,
        autoLoad: true,
        showControls: true,
        showFullscreenCtrl: false,
        mouseZoom: true,
        draggable: true,
        compass: false,
        hfov: 110,
        pitch: 0,
        yaw: 0,
        ignoreGPanoXMP: true,
      };

      if (fullWidth > 0 && fullHeight > 0 && croppedWidth > 0 && croppedHeight > 0) {
        config.haov = (croppedWidth / fullWidth) * 360;
        config.vaov = (croppedHeight / fullHeight) * 180;
        config.vOffset = 90 - (((croppedY + (croppedHeight / 2)) / fullHeight) * 180);
      }

      pannellum.viewer('viewer', config);
    </script>
  </body>
</html>
