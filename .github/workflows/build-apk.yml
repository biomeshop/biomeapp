name: Build Android APK

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: biomeshop-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare release APK name
        if: github.ref == 'refs/heads/main'
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/biomeshop-debug.apk

      - name: Publish stable APK release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: app/build/outputs/apk/debug/biomeshop-debug.apk
          body: Latest debug APK built from the current `main` branch.
          name: Latest APK
          replacesArtifacts: true
          tag: apk-latest
