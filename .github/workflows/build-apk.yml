name: Build Android APK

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build latest APK
        run: gradle assembleDebug

      - name: Update public APK file in repo
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p downloads
          cp app/build/outputs/apk/debug/app-debug.apk downloads/biomeshop-latest.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/biomeshop-latest.apk
          if git diff --cached --quiet; then
            echo "Public APK is already up to date."
          else
            git commit -m "Update latest APK [skip ci]"
            git push
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: biomeshop-latest-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare release APK name
        if: github.ref == 'refs/heads/main'
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/biomeshop-latest.apk

      - name: Publish stable APK release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: app/build/outputs/apk/debug/biomeshop-latest.apk
          body: Latest APK built from the current `main` branch.
          name: Latest APK
          replacesArtifacts: true
          tag: apk-latest
